name: flutter_heyteacher_charts
description: "A high-level Flutter charting library built on top of fl_chart"
version: 2.0.2+114
repository: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_charts
license: BSD 3-Clause
issue_tracker: https://codeberg.org/heyteacher/flutter_heyteacher_packages/issues
homepage: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_charts
documentation: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_charts
topics: [flutter, charts, fl-chart, flutter-charts]
funding: [https://liberapay.com/heyteacher]


environment:
  sdk: ^3.6.2
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  collection: ^1.19.1
  equatable: ^2.0.8
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_heyteacher_locale: ^2.0.11+148
  flutter_heyteacher_views: ^3.0.5+152


dev_dependencies:
  flutter_heyteacher_meta: ^7.3.1+162
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
