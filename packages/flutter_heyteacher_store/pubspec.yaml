name: flutter_heyteacher_store
description: "A heyteacher flutter package for genetrics firestore implementation"
version: 1.15.1+250723073
publish_to: none # Remove this line if you wish to publish to pub.dev
environment:
  sdk: ^3.6.2
  flutter: ">=1.17.0"

dependencies:
  cloud_firestore: ^5.6.7
  collection: ^1.19.0
  firebase_auth: ^5.5.3
  flutter:
    sdk: flutter
  flutter_heyteacher_utils:
    path: ../flutter_heyteacher_utils
  intl: ^0.20.2
  logging: ^1.3.0
  webcrypto: ^0.5.8
  clock: ^1.1.1
  shared_preferences: ^2.5.3
  synchronized: ^3.3.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_secure_storage: ^9.2.4
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1
  shared_preferences_platform_interface: ^2.4.1 
  package_info_plus: ^8.3.0
