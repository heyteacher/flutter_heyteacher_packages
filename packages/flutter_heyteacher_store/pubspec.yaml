name: flutter_heyteacher_store
description: "A heyteacher flutter package for genetrics firestore implementation"
version: 1.29.14+1016
publish_to: none # Remove this line if you wish to publish to pub.dev
environment:
  sdk: ^3.6.2
  flutter: ">=1.17.0"

dependencies:
  clock: ^1.1.1
  cloud_firestore: ^6.0.3
  collection: ^1.19.0
  copy_with_extension: ^13.0.0
  equatable: ^2.0.7
  firebase_auth: ^6.1.1
  flutter:
    sdk: flutter
  flutter_heyteacher_auth:
    path: ../flutter_heyteacher_packages/packages/flutter_heyteacher_auth
  flutter_heyteacher_connectivity:
    path: ../flutter_heyteacher_packages/packages/flutter_heyteacher_connectivity
  flutter_heyteacher_e2ee:
    path: ../flutter_heyteacher_packages/packages/flutter_heyteacher_e2ee
  flutter_heyteacher_firebase:
    path: ../flutter_heyteacher_packages/packages/flutter_heyteacher_firebase
  flutter_heyteacher_platform:
    path: ../flutter_heyteacher_packages/packages/flutter_heyteacher_platform

  intl: ^0.20.2
  logging: ^1.3.0
  mockito: ^5.4.5
  shared_preferences: ^2.5.3
  synchronized: ^3.3.1

dev_dependencies:
  build_runner: ^2.11.1
  copy_with_extension_gen: ^13.0.0
  fake_cloud_firestore: ^4.0.0
  flutter_heyteacher_meta:
  flutter_secure_storage: ^10.0.0
  flutter_test:
    sdk: flutter
  package_info_plus: ^9.0.0
  shared_preferences_platform_interface: ^2.4.1
  very_good_analysis: ^10.0.0
