name: flutter_heyteacher_utils
description: "A heyteacher flutter package which implements common utilies"
version: 1.49.6+117
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  app_tutorial:
    git: https://github.com/heyteacher/app_tutorial.git
  archive: ^4.0.7
  clock: ^1.1.1
  cloud_firestore: ^6.0.3
  collection: ^1.19.1
  connectivity_plus: ^7.0.0
  device_info_plus: ^12.2.0
  equatable:
  firebase_analytics: ^12.0.3
  firebase_app_check: ^0.4.1+1
  firebase_auth: ^6.1.1
  firebase_crashlytics: ^5.0.3
  firebase_messaging: ^16.0.3
  firebase_remote_config: ^6.1.0
  firebase_storage: ^13.0.3
  firebase_ui_auth: ^3.0.0
  firebase_ui_oauth_google: ^2.0.0
  flutter:
    sdk: flutter
  flutter_heyteacher_text_to_speech:
    path: ../flutter_heyteacher_text_to_speech
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  go_router: ^17.0.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logging: ^1.3.0
  mobile_scanner: ^7.1.2
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.3
  shared_preferences_platform_interface: ^2.4.1
  url_launcher: ^6.3.1
  webcrypto:
    git: https://github.com/google/webcrypto.dart.git

dev_dependencies:
  build_runner: ^2.4.15
  fake_async: ^1.3.1 # Or latest
  firebase_auth_mocks: ^0.15.1
  flutter_heyteacher_meta:
    git:
      url: https://github.com/heyteacher/flutter_heyteacher_meta.git
      ref: 573-featmeta-remove-buildnumber-from-version
  flutter_test:
    sdk: flutter
  json_serializable: ^6.10.0
  mockito: ^5.4.5
  test: ^1.21.0 # Or latest
  very_good_analysis: ^10.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true
  assets:
    - assets/locale/
  fonts:
    - family: SocialIcons
      fonts:
        - asset: packages/firebase_ui_auth/fonts/SocialIcons.ttf
  uses-material-design: true # Required if you use the Material icon font
  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
