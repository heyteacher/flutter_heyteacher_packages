name: flutter_heyteacher_utils
description: "A heyteacher flutter package which implements common utilies"
version: 1.17.2+250625094
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_analytics: ^11.3.6
  firebase_app_check: ^0.3.1+7
  firebase_auth: ^5.3.4
  firebase_crashlytics: ^4.2.0
  firebase_messaging: ^15.2.7
  firebase_remote_config: ^5.2.0
  firebase_ui_auth: ^1.16.0
  firebase_ui_oauth_google: ^1.4.0
  cloud_firestore: ^5.5.1
  go_router: ^14.6.2
  google_sign_in: ^6.2.2
  intl: ^0.20.2
  logging: ^1.3.0
  shared_preferences: ^2.3.3
  yaml_edit: ^2.2.1
  flutter_localizations:
    sdk: flutter
  device_info_plus: ^11.2.2
  flutter_secure_storage: ^9.2.4
  webcrypto: ^0.5.7
  url_launcher: ^6.3.1
  clock: ^1.1.1 
  firebase_storage: ^12.4.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.6
  flutter_heyteacher_text_to_speech:
    path: ../flutter_heyteacher_text_to_speech
  app_tutorial: ^1.0.6
  shared_preferences_platform_interface: ^2.4.1
  path_provider: ^2.1.5
  package_info_plus: ^8.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  firebase_auth_mocks: ^0.14.1
  test: ^1.21.0 # Or latest
  fake_async: ^1.3.1 # Or latest
  mockito: ^5.4.5
  build_runner: ^2.4.15

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true
  fonts:
    - family: SocialIcons
      fonts:
        - asset: packages/firebase_ui_auth/fonts/SocialIcons.ttf
  uses-material-design: true # Required if you use the Material icon font
