name: flutter_heyteacher_utils
description: "A new Flutter package project."
version: 1.7.1+250312183
homepage: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  cloud_firestore: ^5.5.1
  firebase_analytics: ^11.3.6
  firebase_app_check: ^0.3.1+7
  firebase_auth: ^5.3.4
  firebase_crashlytics: ^4.2.0
  firebase_remote_config: ^5.2.0
  flutter:
    sdk: flutter
  flutter_background_service: ^5.1.0
  flutter_blue_plus: ^1.34.5
  flutter_tts: ^4.2.0
  font_awesome_flutter: ^10.8.0
  go_router: ^14.6.2
  google_sign_in: ^6.2.2
  intl: any
  logging: ^1.3.0
  package_info_plus: ^8.1.2
  shared_preferences: ^2.3.3
  yaml_edit: ^2.2.1
  firebase_ui_auth: ^1.16.0
  firebase_ui_oauth_google: ^1.4.0
  fl_chart: ^0.70.2
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.0
  device_info_plus: ^11.2.2
  flutter_secure_storage: ^9.2.4
  webcrypto: ^0.5.7
  in_app_purchase: ^3.2.1
  in_app_purchase_android: ^0.4.0
  cloud_functions: ^5.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_cloud_firestore: ^3.1.0
