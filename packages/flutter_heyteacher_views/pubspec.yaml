  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_heyteacher_meta: ^7.6.9+178
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  shared_preferences_platform_interface: ^2.4.2

