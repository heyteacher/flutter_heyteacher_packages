name: flutter_heyteacher_views
description: "The flutter heyteacher package for views layer"
version: 2.0.2+130
homepage:
publish_to: none
environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  app_tutorial:
    git: https://github.com/heyteacher/app_tutorial.git
  cloud_firestore: ^6.1.3
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_heyteacher_auth:
    path: ../flutter_heyteacher_auth
  flutter_heyteacher_locale:
    path: ../flutter_heyteacher_locale
  flutter_heyteacher_platform:
    path: ../flutter_heyteacher_platform
  go_router: ^17.1.0
  logging: ^1.3.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_heyteacher_meta: ^4.4.4+128
  flutter_test:
    sdk: flutter
  mockito: ^5.6.3
  shared_preferences_platform_interface: ^2.4.1

