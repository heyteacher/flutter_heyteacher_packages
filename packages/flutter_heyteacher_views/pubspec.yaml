name: flutter_heyteacher_views
description: "The flutter heyteacher package for views layer"
version: 2.1.1+138
repository: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_views
license: BSD 3-Clause
issue_tracker: https://codeberg.org/heyteacher/flutter_heyteacher_connectivity/issues
homepage: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_views
documentation: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_views
topics: [flutter, widgets, views, mvvm]
funding: [https://liberapay.com/heyteacher]

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  app_tutorial:
    # ignore: invalid_dependency
    git: https://github.com/heyteacher/app_tutorial.git
  cloud_firestore: ^6.1.3
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_heyteacher_auth: any
  flutter_heyteacher_locale: any
  flutter_heyteacher_platform: any
  go_router: ^17.1.0
  logging: ^1.3.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_heyteacher_meta: ^7.0.3+144
  flutter_test:
    sdk: flutter
  mockito: ^5.6.3
  shared_preferences_platform_interface: ^2.4.1

