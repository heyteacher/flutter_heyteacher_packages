name: flutter_heyteacher_auth
description: "The flutter heyteacher package for authentication utilities: UI widgets, stream, sign in and sign out"
version: 4.1.1+165
repository: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_auth
license: BSD 3-Clause
issue_tracker: https://codeberg.org/heyteacher/flutter_heyteacher_packages/issues
homepage: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_auth
documentation: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_auth
topics: [flutter, firebase, auth, oauth, google]
funding: [https://liberapay.com/heyteacher]

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  clock: ^1.1.2
  firebase_auth: ^6.5.6
  firebase_auth_mocks: ^0.15.2
  firebase_remote_config: ^6.5.5
  firebase_ui_auth: ^3.1.0
  firebase_ui_oauth_google: ^2.1.0
  flutter:
    sdk: flutter
  flutter_heyteacher_firebase: ^2.0.13+149
  flutter_heyteacher_locale: ^3.1.0+157
  flutter_heyteacher_platform: ^3.1.2+153
  flutter_heyteacher_views: ^4.3.0+169
  flutter_localizations:
    sdk: flutter
  go_router: ^17.3.0
  intl: ^0.20.2
  logging: ^1.3.0

dev_dependencies:
  flutter_heyteacher_meta: ^7.9.0+183
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  fonts:
    - family: SocialIcons
      fonts:
        - asset: packages/firebase_ui_auth/fonts/SocialIcons.ttf
