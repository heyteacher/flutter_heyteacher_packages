name: flutter_heyteacher_auth
description: "The flutter heyteacher package for authentication utilities."
version: 2.0.8+144
repository: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_auth
license: BSD 3-Clause
issue_tracker: https://codeberg.org/heyteacher/flutter_heyteacher_connectivity/issues
homepage: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_auth
documentation: https://codeberg.org/heyteacher/flutter_heyteacher_packages/src/branch/main/packages/flutter_heyteacher_auth
topics: [flutter, firebase, auth, oauth, google]
funding: [https://liberapay.com/heyteacher]


environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  clock: ^1.1.2
  firebase_auth: ^6.2.0
  firebase_auth_mocks: ^0.15.1
  firebase_remote_config: ^6.2.0
  firebase_ui_auth: ^3.0.1
  firebase_ui_oauth_google: ^2.0.1
  flutter:
    sdk: flutter
  flutter_heyteacher_firebase: any
  flutter_heyteacher_locale: any
  flutter_heyteacher_platform: any
  flutter_heyteacher_views: any
  go_router: ^17.1.0
  logging: ^1.3.0

dev_dependencies:
  flutter_heyteacher_meta: ^7.0.3+144
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  fonts:
    - family: SocialIcons
      fonts:
        - asset: packages/firebase_ui_auth/fonts/SocialIcons.ttf
